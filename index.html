<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajudante de Alfabetização</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <div class="logo-container">
            <img src="power_logo.avif" alt="Mais Power">
        </div>
        <header>
            <h1>Alfabetização Power</h1>
            <nav id="main-nav">
                <button onclick="showMenu()">Menu Principal</button>
                <button onclick="window.location.href='admin.html'">Adicionar Conteúdo</button>
            </nav>
        </header>

        <main id="content">
            <!-- Menu Principal -->
            <div id="menu" class="screen">
                <div class="menu-content">
                    <p>Bem-vindo! Estás pronto para praticar a tua leitura e escrita?</p>
                    <button id="start-game-btn" onclick="startRandomGame()">JOGAR AGORA! 🎮</button>
                </div>
            </div>

            <!-- Ecrã de Jogo -->
            <div id="game-screen" class="screen hidden">
                <div class="status-bar">
                   <button id="tts-btn" class="icon-btn">🔇 Ouvir</button>
                   <span id="score">Pontos: 0</span>
                </div>
                
                <div id="question-area">
                    <img id="game-image" src="" alt="Imagem do Jogo" class="hidden">
                    <div id="question-text"></div>
                    <div id="interaction-area"></div>
                </div>

                <div id="feedback" class="hidden"></div>
                <div class="controls">
                    <button id="retry-btn" class="hidden" onclick="loadQuestion()">Tentar Novamente</button>
                    <button id="next-btn" class="hidden" onclick="loadNextQuestion()">Próxima Pergunta</button>
                </div>
            </div>

            <!-- Ecrã de Vitória -->
            <div id="victory-screen" class="screen hidden">
                <div class="victory-content">
                    <h2 style="font-size: 3em; color: var(--laranja);">🎉 CONSEGUISTE! 🎉</h2>
                    <p style="font-size: 2em;">Completaste todas as perguntas!</p>
                    <div id="final-score" style="font-size: 3em; font-weight: 700; color: var(--cinza); margin: 20px 0;">Pontuação Final: 0</div>
                    <button onclick="showMenu()" style="font-size: 1.5em; background-color: var(--laranja); color: white; border: none; border-radius: 50px; width: 100%; max-width: 400px; padding: 20px;">Jogar Novamente! 🔄</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>

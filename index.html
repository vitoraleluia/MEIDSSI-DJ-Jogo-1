<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literacy Helper</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Literacy Helper</h1>
            <nav id="main-nav">
                <button onclick="showMenu()">Main Menu</button>
                <button onclick="window.location.href='admin.html'">Add Content</button>
            </nav>
        </header>

        <main id="content">
            <!-- Main Menu -->
            <div id="menu" class="screen">
                <div class="menu-content">
                    <p>Welcome! Ready to practice your reading and writing?</p>
                    <button id="start-game-btn" onclick="startRandomGame()" style="font-size: 2em; padding: 30px 60px;">PLAY NOW! 🎮</button>
                </div>
            </div>

            <!-- Game Screens (Hidden by default) -->
            <div id="game-screen" class="screen hidden">
                <div class="status-bar">
                   <button id="tts-btn" class="icon-btn">🔊 Listen</button>
                   <span id="score">Score: 0</span>
                </div>
                
                <div id="question-area">
                    <img id="game-image" src="" alt="Game Image" class="hidden">
                    <div id="question-text"></div>
                    <div id="interaction-area"></div>
                </div>

                <div id="feedback" class="hidden"></div>
                <div class="controls">
                    <button id="retry-btn" class="hidden" onclick="loadQuestion()">Retry</button>
                    <button id="next-btn" class="hidden" onclick="loadNextQuestion()">Next Question</button>
                </div>
            </div>

            <!-- Victory Screen -->
            <div id="victory-screen" class="screen hidden">
                <div class="victory-content">
                    <h2 style="font-size: 3em; color: var(--green);">🎉 YOU DID IT! 🎉</h2>
                    <p style="font-size: 2em;">You completed all the questions!</p>
                    <div id="final-score" style="font-size: 3em; font-weight: 700; color: var(--pink); margin: 20px 0;">Final Score: 0</div>
                    <button onclick="showMenu()" style="font-size: 1.5em; background-color: var(--blue); color: white; box-shadow: 0 8px 0 #0288D1;">Play Again! 🔄</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Ajudante de Alfabetização</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <div class="logo-container">
            <img src="power_logo.avif" alt="Mais Power">
        </div>
        <header>
            <h1>Novo Conteúdo Power</h1>
            <nav id="main-nav">
                <button onclick="window.location.href='index.html'">Voltar ao Jogo</button>
            </nav>
        </header>

        <main class="screen">
            <form id="add-question-form" class="admin-form" style="width: 100%; max-width: 500px; padding-bottom: 20px;">
                <label for="mode">Modo de Jogo:</label>
                <select id="mode" name="mode" required onchange="updateFormFields()">
                    <option value="image-match">Correspondência Imagem-Palavra</option>
                    <option value="complete-phrase">Completar a Frase</option>
                    <option value="syllable-builder">Construtor de Sílabas</option>
                    <option value="keyboard-typing">Ajudante de Escrita</option>
                </select>

                <label for="image">Imagem (URL ou Carregar):</label>
                <input type="text" id="image-url" placeholder="URL da imagem (opcional)">
                <input type="file" id="image-file" accept="image/*">

                <div id="dynamic-fields">
                    <!-- Fields will change based on mode -->
                </div>

                <label for="correct_answer">Resposta Correta:</label>
                <input type="text" id="correct_answer" name="correct_answer" required>

                <button type="submit" style="background-color: var(--laranja); color: white; border: none; width: 100%; margin-top: 10px;">Adicionar Pergunta</button>
            </form>

            <div class="admin-form" style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #ddd;">
                <h3>Carregamento em Massa</h3>
                <label for="json-file">Carregar JSON de perguntas:</label>
                <input type="file" id="json-file" accept=".json">
                
                <div style="margin: 10px 0; display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="replace-data" style="width: auto; margin: 0;">
                    <label for="replace-data" style="margin: 0; font-size: 0.9em; color: var(--cinza); font-weight: normal;">Substituir dados existentes (se desmarcado, adiciona aos atuais)</label>
                </div>
                
                <button type="button" onclick="uploadJSON()" style="background-color: var(--azul); color: white; border: none; width: 100%;">Carregar perguntas</button>
            </div>

            <div style="margin-top: 40px;">
                <button type="button" onclick="clearData()" style="background-color: #eee; color: #777; border: 1px solid #ddd; width: 100%;">Apagar Todos os Dados</button>
            </div>
        </main>
    </div>

    <script src="questions.js"></script>
    <script>
        const modeSelect = document.getElementById('mode');
        const dynamicFields = document.getElementById('dynamic-fields');
        const form = document.getElementById('add-question-form');

        function updateFormFields() {
            const mode = modeSelect.value;
            dynamicFields.innerHTML = '';

            if (mode === 'image-match' || mode === 'complete-phrase') {
                dynamicFields.innerHTML = `
                    <label for="text">Texto da Pergunta ${mode === 'complete-phrase' ? '(usa ___ para o espaço em branco)' : ''}:</label>
                    <input type="text" id="text" name="text" required>
                    <label for="options">Opções (separadas por vírgulas):</label>
                    <input type="text" id="options" name="options" placeholder="ex: maçã, banana, cereja" required>
                `;
            } else if (mode === 'syllable-builder') {
                dynamicFields.innerHTML = `
                    <label for="text">Palavra-alvo:</label>
                    <input type="text" id="text" name="text" required>
                    <label for="syllables">Sílabas (separadas por vírgulas, na ordem correta):</label>
                    <input type="text" id="syllables" name="syllables" placeholder="ex: ba, na, na" required>
                `;
            } else if (mode === 'keyboard-typing') {
                dynamicFields.innerHTML = `
                    <label for="text">Palavra-alvo:</label>
                    <input type="text" id="text" name="text" required>
                `;
            }
        }

        async function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        }

        async function uploadJSON() {
            const fileInput = document.getElementById('json-file');
            const replaceCheckbox = document.getElementById('replace-data');
            
            if (fileInput.files.length === 0) {
                alert("Por favor, seleciona um ficheiro JSON.");
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = (e) => {
                try {
                    const uploadedQuestions = JSON.parse(e.target.result);
                    
                    if (!Array.isArray(uploadedQuestions)) {
                        throw new Error("O ficheiro JSON deve conter um array de perguntas.");
                    }

                    let questionsToSave;
                    if (replaceCheckbox.checked) {
                        questionsToSave = uploadedQuestions;
                    } else {
                        const storedQuestions = JSON.parse(localStorage.getItem('questions') || '[]');
                        // Se não houver nada no localStorage, começamos com as initialData (como no script.js)
                        const baseQuestions = storedQuestions.length > 0 ? storedQuestions : initialData;
                        questionsToSave = [...baseQuestions, ...uploadedQuestions];
                    }

                    localStorage.setItem('questions', JSON.stringify(questionsToSave));
                    localStorage.setItem('questions_version', DATA_VERSION);
                    alert("Perguntas carregadas com sucesso!");
                    fileInput.value = '';
                } catch (error) {
                    alert("Erro ao ler o ficheiro: " + error.message);
                }
            };

            reader.readAsText(file);
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const mode = modeSelect.value;
            const correctAnswer = document.getElementById('correct_answer').value;
            let image = document.getElementById('image-url').value;
            const fileInput = document.getElementById('image-file');

            if (fileInput.files.length > 0) {
                image = await fileToBase64(fileInput.files[0]);
            }

            const newQuestion = {
                mode,
                image,
                correct_answer: correctAnswer
            };

            if (mode === 'image-match' || mode === 'complete-phrase') {
                newQuestion.text = document.getElementById('text').value;
                newQuestion.options = document.getElementById('options').value.split(',').map(s => s.trim());
            } else if (mode === 'syllable-builder') {
                newQuestion.text = document.getElementById('text').value;
                newQuestion.syllables = document.getElementById('syllables').value.split(',').map(s => s.trim());
            } else if (mode === 'keyboard-typing') {
                newQuestion.text = document.getElementById('text').value;
            }

            const storedQuestions = JSON.parse(localStorage.getItem('questions') || '[]');
            storedQuestions.push(newQuestion);
            localStorage.setItem('questions', JSON.stringify(storedQuestions));

            alert("Pergunta adicionada com sucesso!");
            form.reset();
            updateFormFields();
        };

        function clearData() {
            if (confirm("Tens a certeza que queres apagar todos os dados e repor as perguntas iniciais?")) {
                localStorage.removeItem('questions');
                alert("Dados apagados. A recarregar...");
                window.location.reload();
            }
        }

        updateFormFields();
    </script>
</body>
</html>
